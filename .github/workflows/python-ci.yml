name: Python CI

on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404  # Pinned for reproducibility

    steps:
      - uses: actions/checkout@v6

      - name: 📦 Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.1  # Pinned for reproducibility
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: 🔍 Lint
        if: always()
        run: pixi run lint

      - name: 🎨 Format Check
        if: always()
        run: pixi run format-check

      - name: 🕵️ Type Check
        if: always()
        env:
          CONDA_OVERRIDE_CUDA: "12.4"
        run: pixi run typecheck

      - name: 🧪 Run Tests
        if: always()
        env:
          CONDA_OVERRIDE_CUDA: "12.4"
        run: pixi run test

      - name: 👮 PR Conventional Commit Validation
        if: always()
        uses: ytanikin/pr-conventional-commits@1.5.1
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert"]'
