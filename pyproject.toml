[project]
name = "msc-ai-group-project"
version = "0.1.0"
description = "Exposing LLM uncertainty, unfairness, and other related trustworthiness metrics to users at response time."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "gradio>=6.3.0",
    "huggingface-hub>=1.3.2,<2",
    "pyrefly>=0.47.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# =============================================
# PIXI CONFIGURATION - All dependency management
# =============================================

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

# ---------------------------------------------
# Dependencies (conda-forge)
# ---------------------------------------------
[tool.pixi.dependencies]
python = "3.13.*"
pytest = ">=9.0"
ruff = ">=0.8"
python-dotenv = ">=1.2.2,<2"

# ---------------------------------------------
# CUDA Feature (for GPU users)
# ---------------------------------------------
[tool.pixi.feature.cuda.system-requirements]
cuda = "12.4"

# (linux-64 only)

[tool.pixi.feature.cuda.target.linux-64.dependencies]
pytorch = ">=2.6"
flash-attn = ">=2.8.3,<3"
sentencepiece = ">=0.2.1,<0.3"

[tool.pixi.feature.cuda.target.linux-64.pypi-dependencies]
ai2-olmo-core = { version = "==2.4.0", extras = ["transformers", "wandb"] }
hf-transfer = "*"
peft = "*"
datasets = "*"

# ---------------------------------------------
# Environments
# ---------------------------------------------
[tool.pixi.environments]
default = { solve-group = "default" }
cuda = { features = ["cuda"], solve-group = "cuda" }

# ---------------------------------------------
# Tasks
# ---------------------------------------------
[tool.pixi.tasks]
# Linting
lint = "ruff check ."
lint-fix = "ruff check . --fix"

# Formatting
format = "ruff format ."
format-check = "ruff format . --check"

# Testing
test = "pytest"
test-cov = "pytest --cov"

# Type checking
typecheck = "pyrefly check ."

# Application
serve = "python interface.py"

# CI (runs all checks)
check = { depends-on = ["lint", "format-check", "typecheck", "test"] }

[tool.pyrefly]
project-includes = [
    "**/*.py*",
    "**/*.ipynb",
]
